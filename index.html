<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD 文件整理工具</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --surface3: #2a2f46;
    --border: #2e3350;
    --accent: #5b8dee;
    --accent2: #7c5ce8;
    --green: #00c896;
    --red: #ff6b6b;
    --yellow: #ffd166;
    --text: #e2e8f0;
    --text2: #8892b0;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    padding: 24px;
  }

  /* ── Header ── */
  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .header-icon { font-size: 32px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { color: var(--text2); font-size: 13px; margin-top: 2px; }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 13px; font-weight: 600;
    color: var(--text2); text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 14px;
  }

  /* ── Path Input ── */
  .path-row { display: flex; gap: 10px; }
  .path-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s;
  }
  .path-input:focus { border-color: var(--accent); }
  .path-input::placeholder { color: var(--text2); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    border: none; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 600;
    padding: 10px 18px; transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: .85; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--green); color: #0a2a1e; }
  .btn-warn    { background: var(--yellow); color: #2a1e00; }
  .btn-danger  { background: var(--red); color: #fff; }
  .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { font-size: 12px; padding: 5px 11px; border-radius: 6px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── API Config ── */
  .api-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
  }
  .field input:focus { border-color: var(--accent); }

  /* ── Global Stats ── */
  .global-stats {
    display: flex; flex-wrap: wrap; gap: 16px;
    padding: 16px 20px;
    background: var(--surface2);
    border-radius: 10px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .gstat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .gstat-num { font-size: 22px; font-weight: 700; }
  .gstat-label { font-size: 11px; color: var(--text2); }

  /* ── Group Block ── */
  .group-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .group-header {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 18px;
    cursor: pointer;
    background: var(--surface2);
    user-select: none;
    transition: background .15s;
  }
  .group-header:hover { background: var(--surface3); }
  .group-chevron {
    font-size: 11px; color: var(--text2);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .group-chevron.open { transform: rotate(90deg); }
  .group-path {
    font-family: monospace; font-size: 13px;
    color: var(--accent); flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .group-badge {
    font-size: 11px; color: var(--text2);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 2px 8px;
    flex-shrink: 0;
  }
  .group-ok-badge {
    font-size: 11px; color: var(--green);
    background: rgba(0,200,150,.1);
    border: 1px solid rgba(0,200,150,.3);
    border-radius: 99px;
    padding: 2px 8px;
    flex-shrink: 0;
    display: none;
  }
  .group-body { display: none; padding: 0 4px 4px; }
  .group-body.open { display: block; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; padding: 9px 12px;
    color: var(--text2); font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid rgba(46,51,80,.5); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(91,141,238,.04); }
  tbody td { padding: 10px 12px; vertical-align: middle; }

  .col-idx { width: 40px; color: var(--text2); font-size: 12px; }
  .col-name { min-width: 200px; }
  .col-chars { width: 90px; text-align: right; }
  .col-name-ok { width: 150px; text-align: center; }
  .col-char-ok { width: 170px; text-align: center; }

  .filename { font-family: monospace; font-size: 13px; color: var(--text); }
  .char-count { font-variant-numeric: tabular-nums; }
  .char-over { color: var(--red); font-weight: 600; }

  /* ── Badges ── */
  .badge-ok {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--green); font-weight: 600; font-size: 13px;
  }
  .badge-ok svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* ── Progress ── */
  .progress-wrap { display: none; align-items: center; gap: 12px; margin-top: 14px; }
  .progress-wrap.show { display: flex; }
  .progress-bar-bg {
    flex: 1; height: 6px;
    background: var(--surface2); border-radius: 99px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px; transition: width .3s;
  }
  .progress-label { font-size: 12px; color: var(--text2); white-space: nowrap; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    width: 500px; max-width: 95vw;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }
  .modal h3 { font-size: 17px; margin-bottom: 18px; }
  .modal .hint { font-size: 12px; color: var(--text2); margin-top: 6px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

  /* ── Toast ── */
  .toast-container { position: fixed; top: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 200; }
  .toast {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px;
    font-size: 13px; max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    animation: fadeIn .2s;
  }
  .toast.ok  { border-left: 3px solid var(--green); }
  .toast.err { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--accent); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }

  /* ── Spinner ── */
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .shrink-status { font-size: 11px; color: var(--text2); margin-top: 4px; }

  .empty-state { text-align: center; padding: 56px; color: var(--text2); font-size: 14px; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Collapse all bar ── */
  .group-controls {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .group-controls-title { font-size: 14px; font-weight: 600; color: var(--text2); }
  .group-controls-btns { display: flex; gap: 8px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">📋</div>
  <div>
    <h1>MD 文件整理工具</h1>
    <p>递归扫描所有子文件夹，按目录分组检查文件名规范性与字符数限制，支持自动修复</p>
  </div>
</div>

<!-- Path Card -->
<div class="card">
  <div class="card-title">📁 目标根目录</div>
  <div class="path-row">
    <input type="text" id="dirInput" class="path-input"
      placeholder="输入根目录绝对路径，例如 C:\Users\me\Documents\rules（将递归扫描所有子文件夹）">
    <button class="btn btn-primary" onclick="scanDir()">🔍 扫描</button>
    <button class="btn btn-ghost" onclick="clearAll()">清空</button>
  </div>
  <div style="margin-top:12px; display:flex; align-items:center; gap:12px;">
    <label style="font-size:12px; color:var(--text2); white-space:nowrap;">字符数限制（默认 20480）：</label>
    <input type="number" id="charLimit" value="20480" min="1000" max="100000" step="1000"
      style="width:120px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; padding:8px 12px; outline:none;"
      oninput="saveConfig()">
  </div>
  <div class="progress-wrap" id="scanProgress">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <span class="progress-label" id="progressLabel">扫描中…</span>
  </div>
</div>

<!-- Skip List Config Card -->
<div class="card">
  <div class="card-title">🚫 跳过列表（扫描时忽略）</div>
  <div class="api-grid">
    <div class="field" style="grid-column: span 2;">
      <label>跳过的文件夹（用逗号分隔，默认已包含 node_modules）</label>
      <input type="text" id="skipFolders" placeholder="dist, build, .git, .vscode, node_modules" oninput="saveConfig()">
    </div>
    <div class="field">
      <label>跳过的文件名（用逗号分隔，支持 * 通配符）</label>
      <input type="text" id="skipFiles" placeholder="README.md, LICENSE.md, *.test.md" oninput="saveConfig()">
    </div>
  </div>
</div>

<!-- AI Config Card -->
<div class="card">
  <div class="card-title">🤖 AI 精简配置（字符数超出限制时使用）</div>
  <div class="api-grid">
    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." oninput="saveConfig()">
    </div>
    <div class="field">
      <label>API Base URL（可选，默认 DeepSeek）</label>
      <input type="text" id="apiBase" placeholder="https://api.deepseek.com" oninput="saveConfig()">
    </div>
    <div class="field">
      <label>模型（可选）</label>
      <input type="text" id="apiModel" placeholder="deepseek-chat" oninput="saveConfig()">
    </div>
  </div>
  <div style="margin-top:12px;" class="field">
    <label>HTTP 代理（可选，用于访问 API）</label>
    <input type="text" id="proxyUrl" placeholder="http://127.0.0.1:7890 或 socks5://127.0.0.1:1080" oninput="saveConfig()">
  </div>
</div>

<!-- Results -->
<div id="resultArea"></div>

<!-- Rename Modal -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h3>✏️ 重命名文件</h3>
    <div class="field">
      <label>原文件路径</label>
      <input type="text" id="renameOldPath" readonly style="opacity:.6;cursor:not-allowed;font-family:monospace;font-size:12px">
    </div>
    <div style="margin-top:14px" class="field">
      <label>新文件名（不含 .md 扩展名）</label>
      <input type="text" id="renameNewName" oninput="validateRenameInput()">
      <div class="hint">仅允许小写字母、数字、连字符（a-z 0-9 -），长度 ≤50 字节</div>
    </div>
    <div id="renameError" style="color:var(--red);font-size:12px;margin-top:8px;display:none"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeRenameModal()">取消</button>
      <button class="btn btn-success" id="renameConfirmBtn" onclick="confirmRename()">
        确认重命名（原文件备份为 .bak）
      </button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ─── State ────────────────────────────────────────────────
// groups = [{ folder, folderRel, files: [...] }]
// fileMap: "groupIdx-fileIdx" → file object
let scanResult = null;
let renameTarget = null; // { groupIdx, fileIdx }

const CHECK_SVG = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5">
  <path stroke-linecap="round" stroke-linejoin="round" d="M4 10l4.5 4.5L16 6"/>
</svg>`;

// ─── Config ───────────────────────────────────────────────
function saveConfig() {
  localStorage.setItem('md_apiKey',   document.getElementById('apiKey').value);
  localStorage.setItem('md_apiBase',  document.getElementById('apiBase').value);
  localStorage.setItem('md_apiModel', document.getElementById('apiModel').value);
  localStorage.setItem('md_proxyUrl', document.getElementById('proxyUrl').value);
  localStorage.setItem('md_skipFolders', document.getElementById('skipFolders').value);
  localStorage.setItem('md_skipFiles', document.getElementById('skipFiles').value);
  localStorage.setItem('md_charLimit', document.getElementById('charLimit').value);
}
function loadConfig() {
  document.getElementById('apiKey').value   = localStorage.getItem('md_apiKey')   || '';
  document.getElementById('apiBase').value  = localStorage.getItem('md_apiBase')  || '';
  document.getElementById('apiModel').value = localStorage.getItem('md_apiModel') || '';
  document.getElementById('proxyUrl').value = localStorage.getItem('md_proxyUrl') || '';
  document.getElementById('skipFolders').value = localStorage.getItem('md_skipFolders') || '';
  document.getElementById('skipFiles').value = localStorage.getItem('md_skipFiles') || '';
  document.getElementById('charLimit').value = localStorage.getItem('md_charLimit') || '20480';
}
loadConfig();

// ─── Toast ────────────────────────────────────────────────
function toast(msg, type = 'info', duration = 3500) {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ─── Scan ─────────────────────────────────────────────────
async function scanDir() {
  const dir = document.getElementById('dirInput').value.trim();
  if (!dir) { toast('请输入目录路径', 'err'); return; }

  showProgress(true, '递归扫描中…');
  try {
    const res = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        dir,
        skipFolders: document.getElementById('skipFolders').value.trim(),
        skipFiles: document.getElementById('skipFiles').value.trim(),
        charLimit: parseInt(document.getElementById('charLimit').value, 10) || 20480
      })
    });
    const data = await res.json();
    if (!res.ok) {
      const errMsg = data.error || '未知错误';
      const detailMsg = data.detail ? '\n\n详情：' + data.detail.split('\n')[0] : '';
      toast('❌ ' + errMsg + detailMsg, 'err', 8000);
      console.error('Scan error:', data);
      return;
    }

    scanResult = data;
    renderAll();
    toast(`扫描完成：${data.groups.length} 个文件夹，共 ${data.totalFiles} 个 .md 文件`, 'ok');
  } catch (e) {
    toast('请求失败，请确认后端服务已启动（双击 start.bat）', 'err', 6000);
  } finally {
    showProgress(false);
  }
}

function clearAll() {
  document.getElementById('dirInput').value = '';
  document.getElementById('resultArea').innerHTML = '';
  scanResult = null;
}

// ─── Render All ──────────────────────────────────────────
function renderAll() {
  const area = document.getElementById('resultArea');
  const { groups, totalFiles } = scanResult;

  if (groups.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🗂️</div>未找到任何 .md 文件</div>`;
    return;
  }

  // 全局统计
  let totalNameOk = 0, totalCharOk = 0;
  groups.forEach(g => g.files.forEach(f => {
    if (f.nameValid) totalNameOk++;
    if (f.charOk)   totalCharOk++;
  }));

  let html = `
    <div class="global-stats">
      <div class="gstat">
        <span class="gstat-num" style="color:var(--accent)">${groups.length}</span>
        <span class="gstat-label">文件夹</span>
      </div>
      <div class="gstat">
        <span class="gstat-num" style="color:var(--text)">${totalFiles}</span>
        <span class="gstat-label">MD 文件</span>
      </div>
      <div class="gstat">
        <span class="gstat-num" style="color:var(--green)">${totalNameOk}</span>
        <span class="gstat-label">文件名合规</span>
      </div>
      <div class="gstat">
        <span class="gstat-num" style="color:${totalNameOk < totalFiles ? 'var(--red)' : 'var(--green)'}">${totalFiles - totalNameOk}</span>
        <span class="gstat-label">需重命名</span>
      </div>
      <div class="gstat">
        <span class="gstat-num" style="color:var(--green)">${totalCharOk}</span>
        <span class="gstat-label">字符数合规</span>
      </div>
      <div class="gstat">
        <span class="gstat-num" style="color:${totalCharOk < totalFiles ? 'var(--red)' : 'var(--green)'}">${totalFiles - totalCharOk}</span>
        <span class="gstat-label">超字符限制</span>
      </div>
    </div>
    <div class="group-controls">
      <span class="group-controls-title">按文件夹分组（共 ${groups.length} 个）</span>
      <div class="group-controls-btns">
        <button class="btn btn-ghost btn-sm" onclick="expandAll()">全部展开</button>
        <button class="btn btn-ghost btn-sm" onclick="collapseAll()">全部折叠</button>
      </div>
    </div>
  `;

  groups.forEach((g, gi) => {
    const nameIssues = g.files.filter(f => !f.nameValid).length;
    const charIssues = g.files.filter(f => !f.charOk).length;
    const allOk = nameIssues === 0 && charIssues === 0;

    html += `
    <div class="group-block" id="group-${gi}">
      <div class="group-header" onclick="toggleGroup(${gi})">
        <span class="group-chevron open" id="chevron-${gi}">▶</span>
        <span class="group-path" title="${escHtml(g.folder)}">${escHtml(g.folderRel === '.' ? scanResult.dir : g.folderRel)}</span>
        <span class="group-badge">${g.files.length} 个文件</span>
        ${nameIssues > 0 ? `<span style="font-size:11px;color:var(--yellow);background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.3);border-radius:99px;padding:2px 8px">${nameIssues} 需重命名</span>` : ''}
        ${charIssues > 0 ? `<span style="font-size:11px;color:var(--red);background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:99px;padding:2px 8px">${charIssues} 超字符</span>` : ''}
        ${allOk ? `<span style="font-size:11px;color:var(--green);background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.3);border-radius:99px;padding:2px 8px">✓ 全部合规</span>` : ''}
      </div>
      <div class="group-body open" id="gbody-${gi}">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="col-idx">#</th>
                <th class="col-name">文件名</th>
                <th class="col-chars">字符数</th>
                <th class="col-name-ok">文件名规范</th>
                <th class="col-char-ok">字符数检查</th>
              </tr>
            </thead>
            <tbody>
              ${g.files.map((f, fi) => renderRow(f, gi, fi)).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  });

  area.innerHTML = html;
}

function renderRow(f, gi, fi) {
  return `
    <tr id="row-${gi}-${fi}">
      <td class="col-idx">${fi + 1}</td>
      <td class="col-name">
        <div class="filename">${escHtml(f.fileName)}</div>
      </td>
      <td class="col-chars">
        <span class="char-count ${f.charOk ? '' : 'char-over'}" id="charNum-${gi}-${fi}">
          ${f.charCount.toLocaleString()}
        </span>
      </td>
      <td class="col-name-ok" id="nameCell-${gi}-${fi}">
        ${renderNameCell(f, gi, fi)}
      </td>
      <td class="col-char-ok" id="charCell-${gi}-${fi}">
        ${renderCharCell(f, gi, fi)}
      </td>
    </tr>`;
}

function renderNameCell(f, gi, fi) {
  if (f.nameValid) return `<span class="badge-ok">${CHECK_SVG} 合规</span>`;
  return `<div>
    <button class="btn btn-warn btn-sm" onclick="openRenameModal(${gi},${fi})">✏️ 修改</button>
    <div style="font-size:11px;color:var(--text2);margin-top:4px">
      建议：<code style="color:var(--yellow)">${escHtml(f.suggestedName)}</code>
    </div>
  </div>`;
}

function renderCharCell(f, gi, fi) {
  const limit = scanResult.charLimit || 20480;
  if (f.charOk) return `<span class="badge-ok">${CHECK_SVG} ≤ ${limit.toLocaleString()}</span>`;
  return `<div>
    <button class="btn btn-danger btn-sm" id="shrinkBtn-${gi}-${fi}" onclick="shrinkFile(${gi},${fi})">🤖 AI 精简</button>
    <div class="shrink-status" id="shrinkStatus-${gi}-${fi}">超出 ${(f.charCount - limit).toLocaleString()} 字符</div>
  </div>`;
}

// ─── Group Toggle ─────────────────────────────────────────
function toggleGroup(gi) {
  const body = document.getElementById('gbody-' + gi);
  const chev = document.getElementById('chevron-' + gi);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}
function expandAll() {
  scanResult.groups.forEach((_, gi) => {
    document.getElementById('gbody-' + gi).classList.add('open');
    document.getElementById('chevron-' + gi).classList.add('open');
  });
}
function collapseAll() {
  scanResult.groups.forEach((_, gi) => {
    document.getElementById('gbody-' + gi).classList.remove('open');
    document.getElementById('chevron-' + gi).classList.remove('open');
  });
}

// ─── Rename Modal ─────────────────────────────────────────
function openRenameModal(gi, fi) {
  renameTarget = { gi, fi, file: scanResult.groups[gi].files[fi] };
  document.getElementById('renameOldPath').value = renameTarget.file.fullPath;
  document.getElementById('renameNewName').value = renameTarget.file.suggestedName;
  document.getElementById('renameError').style.display = 'none';
  document.getElementById('renameConfirmBtn').disabled = false;
  document.getElementById('renameModal').classList.add('show');
  setTimeout(() => document.getElementById('renameNewName').focus(), 50);
}
function closeRenameModal() {
  document.getElementById('renameModal').classList.remove('show');
  renameTarget = null;
}
function validateRenameInput() {
  const val = document.getElementById('renameNewName').value;
  const validChars = /^[a-z0-9-]+$/.test(val);
  const byteLen = new Blob([val]).size; // 计算字节数
  const errEl = document.getElementById('renameError');
  const btn   = document.getElementById('renameConfirmBtn');
  if (!validChars || !val) {
    errEl.textContent = '仅允许小写字母 (a-z)、数字 (0-9)、连字符 (-)';
    errEl.style.display = 'block';
    btn.disabled = true;
  } else if (byteLen > 50) {
    errEl.textContent = '文件名长度超过 50 字节（当前 ' + byteLen + ' 字节）';
    errEl.style.display = 'block';
    btn.disabled = true;
  } else {
    errEl.style.display = 'none';
    btn.disabled = false;
  }
}
async function confirmRename() {
  if (!renameTarget) return;
  const newBaseName = document.getElementById('renameNewName').value.trim();
  if (!/^[a-z0-9-]+$/.test(newBaseName)) return;

  const { gi, fi, file } = renameTarget;
  const btn = document.getElementById('renameConfirmBtn');
  btn.disabled = true; btn.textContent = '处理中…';

  try {
    const res = await fetch('/api/rename', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filePath: file.fullPath, newBaseName })
    });
    const data = await res.json();
    if (!res.ok) { toast('❌ ' + data.error, 'err', 5000); return; }

    // Update state
    const f = scanResult.groups[gi].files[fi];
    f.fileName = newBaseName + '.md';
    f.baseName  = newBaseName;
    f.fullPath  = data.newPath;
    f.nameValid = true;

    // Update DOM
    document.getElementById('row-' + gi + '-' + fi).querySelector('.filename').textContent = f.fileName;
    document.getElementById('nameCell-' + gi + '-' + fi).innerHTML = `<span class="badge-ok">${CHECK_SVG} 合规</span>`;

    updateGroupBadges(gi);
    updateGlobalStats();
    closeRenameModal();
    toast(`✅ 已重命名为 ${f.fileName}（原文件已备份为 .bak）`, 'ok', 5000);
  } catch (e) {
    toast('请求失败: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '确认重命名（原文件备份为 .bak）';
  }
}
document.getElementById('renameModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeRenameModal();
});

// ─── AI Shrink ────────────────────────────────────────────
async function shrinkFile(gi, fi) {
  const file   = scanResult.groups[gi].files[fi];
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { toast('请先填写 AI 配置中的 API Key', 'err'); return; }

  const btn      = document.getElementById('shrinkBtn-' + gi + '-' + fi);
  const statusEl = document.getElementById('shrinkStatus-' + gi + '-' + fi);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> AI 处理中…';
  statusEl.textContent = '正在调用 AI 精简，请稍候（约 30-60 秒）…';

  try {
    const res = await fetch('/api/shrink', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        filePath: file.fullPath,
        apiKey,
        apiBase: document.getElementById('apiBase').value.trim(),
        model:   document.getElementById('apiModel').value.trim(),
        proxyUrl: document.getElementById('proxyUrl').value.trim(),
        charLimit: scanResult.charLimit || 20480
      })
    });
    const data = await res.json();
    if (!res.ok) {
      toast('❌ ' + data.error, 'err', 7000);
      btn.disabled = false; btn.textContent = '🤖 AI 精简';
      statusEl.textContent = '处理失败，请重试';
      return;
    }

    file.charCount = data.newChars;
    file.charOk    = data.charOk;

    const numEl = document.getElementById('charNum-' + gi + '-' + fi);
    numEl.textContent = data.newChars.toLocaleString();
    const limit = scanResult.charLimit || 20480;
    if (data.charOk) {
      numEl.classList.remove('char-over');
      document.getElementById('charCell-' + gi + '-' + fi).innerHTML =
        `<span class="badge-ok">${CHECK_SVG} ≤ ${limit.toLocaleString()}</span>`;
    } else {
      statusEl.textContent = `仍超出 ${(data.newChars - limit).toLocaleString()} 字符，可再次精简`;
      btn.disabled = false; btn.textContent = '🤖 再次精简';
    }

    updateGroupBadges(gi);
    updateGlobalStats();
    toast(`✅ 精简完成：${data.originalChars.toLocaleString()} → ${data.newChars.toLocaleString()} 字符（原文件已备份）`, 'ok', 6000);
  } catch (e) {
    toast('请求失败: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '🤖 AI 精简';
    statusEl.textContent = '处理失败，请重试';
  }
}

// ─── Update Stats ─────────────────────────────────────────
function updateGroupBadges(gi) {
  const g = scanResult.groups[gi];
  const nameIssues = g.files.filter(f => !f.nameValid).length;
  const charIssues = g.files.filter(f => !f.charOk).length;
  const allOk = nameIssues === 0 && charIssues === 0;
  const header = document.querySelector('#group-' + gi + ' .group-header');
  // Rebuild badges (keep first 3 children: chevron, path, count-badge)
  const children = Array.from(header.children);
  children.slice(3).forEach(c => c.remove());
  if (nameIssues > 0) header.insertAdjacentHTML('beforeend', `<span style="font-size:11px;color:var(--yellow);background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.3);border-radius:99px;padding:2px 8px">${nameIssues} 需重命名</span>`);
  if (charIssues > 0) header.insertAdjacentHTML('beforeend', `<span style="font-size:11px;color:var(--red);background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:99px;padding:2px 8px">${charIssues} 超字符</span>`);
  if (allOk)          header.insertAdjacentHTML('beforeend', `<span style="font-size:11px;color:var(--green);background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.3);border-radius:99px;padding:2px 8px">✓ 全部合规</span>`);
}

function updateGlobalStats() {
  const groups = scanResult.groups;
  let totalFiles = 0, totalNameOk = 0, totalCharOk = 0;
  groups.forEach(g => g.files.forEach(f => {
    totalFiles++;
    if (f.nameValid) totalNameOk++;
    if (f.charOk)   totalCharOk++;
  }));
  const gs = document.querySelector('.global-stats');
  if (!gs) return;
  const nums = gs.querySelectorAll('.gstat-num');
  nums[0].textContent = groups.length;
  nums[1].textContent = totalFiles;
  nums[2].textContent = totalNameOk;
  nums[3].textContent = totalFiles - totalNameOk;
  nums[3].style.color = (totalFiles - totalNameOk) > 0 ? 'var(--red)' : 'var(--green)';
  nums[4].textContent = totalCharOk;
  nums[5].textContent = totalFiles - totalCharOk;
  nums[5].style.color = (totalFiles - totalCharOk) > 0 ? 'var(--red)' : 'var(--green)';
}

// ─── Helpers ─────────────────────────────────────────────
function showProgress(show, label = '') {
  const wrap = document.getElementById('scanProgress');
  if (show) {
    wrap.classList.add('show');
    document.getElementById('progressLabel').textContent = label;
    document.getElementById('progressFill').style.width = '60%';
    setTimeout(() => { document.getElementById('progressFill').style.width = '90%'; }, 500);
  } else {
    document.getElementById('progressFill').style.width = '100%';
    setTimeout(() => { wrap.classList.remove('show'); document.getElementById('progressFill').style.width = '0'; }, 400);
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

document.getElementById('dirInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') scanDir();
});
</script>
</body>
